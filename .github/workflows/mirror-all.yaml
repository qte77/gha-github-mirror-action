---
name: Mirror All Repos

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  load:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.cfg.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        run: echo "matrix=$(yq -o=json config/repos.yaml)" >> "$GITHUB_OUTPUT"

  mirror:
    needs: load
    if: needs.load.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.load.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: qte77/gha-github-mirror-action@v0
        with:
          source_repo: ${{ matrix.repo.source }}
          gitlab_url: ${{ matrix.repo.gitlab }}
          gitlab_pat: ${{ secrets.GITLAB_PAT }}
          codeberg_url: ${{ matrix.repo.codeberg }}
          codeberg_pat: ${{ secrets.CODEBERG_PAT }}
